# i2o Execution PRD YAML Template (Story-Centric, Data-Hardened)
# Use this template to write PRDs the way the dev team expects: Objective -> Stories -> Artifacts -> Corner cases -> Acceptance -> Release mapping
template:
  id: i2o-prd-template-execution-v1
  name: i2o Execution PRD YAML Template (Story-Centric, Data-Hardened)
  version: '1.0'
  output:
    format: markdown
    filename: jira/prd-i2o-execution.md
    title: '{{project_name}} – Product Requirements Document (Execution PRD)'
  metadata:
    author: '{{pm_name}}'
    stakeholders: '{{stakeholder_list}}'
    jira_epic: '{{epic_link}}'
    confluence_page: '{{confluence_link}}'
workflow:
  mode: interactive
  elicitation: story-centric
  validation: dev-review
sections:
- id: objective
  title: Objective of the Requirement
  priority: critical
  instruction: 'Explain the problem we are trying to solve, why we are solving it now, who benefits, and how we
    will measure success.

    Keep it crisp and testable.'
  fields:
  - name: problem_statement
    type: text
    required: true
    hint: What pain exists today?
  - name: why_now
    type: text
    required: false
    hint: Why prioritize now?
  - name: impacted_users
    type: list
    required: true
    hint: Roles/users who benefit (e.g., Client user, AM, Research Ops).
  - name: success_metrics
    type: list
    required: true
    hint: Quantified metrics with baseline and target when possible.
  - name: non_goals
    type: list
    required: false
    hint: Explicitly state what this requirement is NOT trying to do.
  output_format: bullets
  max_length: 1 page
- id: metric-definitions
  title: Metric Definitions (Single Source of Truth)
  priority: critical
  instruction: 'Define every metric referenced anywhere in the PRD exactly once here.

    This is the contract that prevents SUM vs AVG ambiguity and ensures consistent semantics across stories.'
  type: table
  fields:
  - name: metric_name
    type: text
    required: true
  - name: business_definition
    type: text
    required: true
  - name: formula
    type: text
    required: true
    hint: Explicit formula (e.g., lost_sales = (MAP_price - observed_price) * units).
  - name: aggregation_type
    type: enum
    required: true
    enum:
    - SUM
    - AVG
    - COUNT
    - DISTINCT_COUNT
    - CUSTOM
  - name: time_granularity
    type: enum
    required: true
    enum:
    - daily
    - weekly
    - monthly
    - rolling
    - custom
  - name: grouping_dimensions
    type: list
    required: false
    hint: E.g., marketplace, seller_id, product_id, time.
  - name: null_handling
    type: text
    required: true
    hint: E.g., treat null units as 0; exclude null prices; etc.
  - name: source_of_truth
    type: list
    required: true
    hint: Tables/views that are authoritative.
  - name: columns_used
    type: list
    required: false
  - name: data_freshness
    type: text
    required: false
    hint: Refresh cadence + expected lag.
  - name: known_gaps
    type: text
    required: false
    hint: Document any data gaps/coverage limits.
  examples:
  - metric_name: lost_sales_usd
    business_definition: Estimated revenue lost to unauthorized sellers within the selected time range.
    formula: (reference_price_usd - observed_price_usd) * units_sold
    aggregation_type: SUM
    time_granularity: monthly
    grouping_dimensions:
    - time_month
    - marketplace
    - product_id
    null_handling: If units_sold is null, treat as 0; if observed_price_usd is null, exclude row.
    source_of_truth:
    - fact_sales
    - dim_product
    - fact_price_observations
    columns_used:
    - units_sold
    - observed_price_usd
    - reference_price_usd
    - product_id
    - marketplace
    - date
- id: user-stories
  title: User Stories (Breakdown + Dependency Map)
  priority: critical
  instruction: 'Break the problem into user stories that can be built independently where possible.

    For every story, explicitly list dependencies and what it blocks. If a story introduces a filter/calendar/time-range
    control, call out

    which metrics it controls and how aggregation/time-grain should behave.'
  sections:
  - id: story-index
    title: Story Index
    type: table
    instruction: List all stories with type and dependency relationships for quick planning.
    fields:
    - name: id
      type: text
      required: true
      hint: US-1, US-2, ...
    - name: title
      type: text
      required: true
    - name: story_type
      type: enum
      required: true
      enum:
      - ui
      - backend
      - data_science
      - hybrid
      - filter_component
    - name: standalone
      type: boolean
      required: true
    - name: depends_on
      type: list
      required: false
    - name: blocks
      type: list
      required: false
  - id: story-details
    title: Story Details (Repeat Per User Story)
    type: repeatable
    instruction: 'For each user story, attach the relevant artifacts (UI screenshots & interactions OR backend tables/columns
      OR DS I/O).

      Be explicit about any aggregation semantics for metrics used by this story, especially if the story introduces
      a filter/calendar.'
    fields:
    - name: id
      type: text
      required: true
    - name: title
      type: text
      required: true
    - name: user_story
      type: text
      required: true
      hint: As a __, I want __, so that __
    - name: story_type
      type: enum
      required: true
      enum:
      - ui
      - backend
      - data_science
      - hybrid
      - filter_component
    - name: dependency_map
      type: object
      required: true
      schema:
        standalone: boolean
        depends_on: list
        blocks: list
        notes: text
    - name: artifacts
      type: object
      required: true
      schema:
        ui:
          screenshots_or_links: list
          components: list
          interactions: text
          states:
            loading: text
            empty: text
            error: text
            partial_data: text
        backend:
          tables: list
          columns: list
          joins: text
          logic: text
          metrics_used: list
          aggregation_clarity: text
          api_contract:
            endpoint: text
            request_params: text
            response_schema: text
        data_science:
          objective: text
          inputs: list
          features: list
          output_schema: text
          confidence_threshold: text
          hitl_flow: text
          fallback_behavior: text
        filter_or_calendar:
          controlled_metrics: list
          allowed_time_ranges: list
          default_time_range: text
          impact_on_aggregation: text
          time_grain_behavior: text
    - name: corner_cases
      type: list
      required: true
      hint: List scenario + expected behavior.
    - name: acceptance_criteria
      type: list
      required: true
      hint: A/B/C pass criteria; clear pass/fail.
    - name: data_constraints
      type: object
      required: false
      schema:
        refresh_frequency: text
        expected_lag: text
        late_arriving_data_handling: text
        backfill_required: boolean
        validation_rules: list
    examples:
    - id: US-2
      title: Time-range filter for Lost Sales table
      user_story: As an end user, I want to view Lost Sales across selectable time ranges so that I can analyze
        impact over time.
      story_type: filter_component
      dependency_map:
        standalone: false
        depends_on:
        - US-1
        blocks: []
        notes: Depends on Lost Sales table metric readiness.
      artifacts:
        filter_or_calendar:
          controlled_metrics:
          - lost_sales_usd
          allowed_time_ranges:
          - Last 7 days
          - Last 30 days
          - MTD
          - QTD
          - Monthly (last 12 months)
          default_time_range: Last 30 days
          impact_on_aggregation: Lost Sales must remain SUM at the selected time grain; never average.
          time_grain_behavior: If 'Monthly (last 12 months)' selected, group by month and SUM.
      corner_cases:
      - If no data exists for the selected range, show empty state with 'No data for selected range' and do not
        error.
      - If partial data (some marketplaces missing), show banner and render available marketplaces.
      acceptance_criteria:
      - Selecting 'Monthly (last 12 months)' updates the table to 12 rows grouped by month with SUM aggregation.
      - Selecting 'Last 30 days' shows daily rows (or total, per requirements) and matches metric definition for
        lost_sales_usd.
- id: corner-cases-global
  title: Global Corner Case Inventory (Optional)
  priority: optional
  instruction: If there are recurring data/UI corner cases across multiple stories, list them once here and reference
    in story sections.
  output_format: bullets
  max_length: 0.5 page
- id: release-planning
  title: Release Mapping (Optional but Recommended)
  priority: recommended
  instruction: Map user stories to releases and keep dependencies in mind. This is used for sequencing and stakeholder
    communication.
  type: table
  fields:
  - name: release_version
    type: text
    required: true
  - name: date
    type: text
    required: false
  - name: included_user_stories
    type: list
    required: true
  - name: notes
    type: text
    required: false
metadata:
  style_guidance:
  - Prefer explicit formulas over prose.
  - 'For every metric: declare aggregation type and time grain.'
  - 'For filter/calendar stories: declare controlled metrics and impact on aggregation.'
  - List data gaps and how UI should behave under partial data.
validation_rules:
- id: metrics_must_be_defined
  severity: high
  rule: All metrics referenced in any story must exist in metric_definitions.metric_name.
- id: filter_stories_require_aggregation_clarity
  severity: high
  rule: If story_type == filter_component, artifacts.filter_or_calendar.impact_on_aggregation and time_grain_behavior
    must be provided.
- id: backend_stories_require_tables_and_logic
  severity: high
  rule: If story_type in [backend, hybrid], artifacts.backend.tables, columns, and logic must be provided.
- id: acceptance_criteria_required
  severity: high
  rule: Every user story must include acceptance_criteria with pass/fail wording.
output_enhancements:
  recommended_tables:
  - Metric Definitions
  - Story Index
  - Release Mapping
  auto_checks:
  - Detect undefined metrics
  - Detect missing aggregation/time grain for filter/calendar stories
  - Detect missing empty/error/partial UI states for UI/hybrid stories
